<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚦 Tablero de Despachos</title>

  <style>
    :root{
      --bg:#0b1220; --card:#101a33; --text:#e9eefc; --muted:#a7b2d6;
      --line:#22305a; --ok:#2ecc71; --warn:#f7b500; --work:#2d7dff; --bad:#e74c3c;
    }
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,#070b14,var(--bg));
      color:var(--text);
    }
    header{
      padding:16px 18px;
      background:rgba(11,18,32,.94);
      backdrop-filter: blur(6px);
      border-bottom:1px solid var(--line);
      position:sticky; top:0; z-index:10;
    }
    header h1{margin:0;font-size:20px}
    header p{margin:6px 0 0;color:var(--muted);font-size:13px}

    .wrap{max-width:1400px;margin:0 auto;padding:16px}
    .card{
      background:rgba(16,26,51,.92);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
    }

    table{width:100%;border-collapse:collapse}
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      font-size:13px;
      text-align:left;
      vertical-align:top;
    }
    th{
      color:var(--muted);
      font-weight:900;
      position:sticky;
      top:86px;
      background:rgba(16,26,51,.96);
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      color:#fff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .small{font-size:12px;color:var(--muted)}

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
      align-items:center;
    }

    input{
      padding:10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#0b1430;
      color:var(--text);
      min-width:260px;
    }

    a.btn{
      text-decoration:none;
      font-weight:900;
      background:#0b1430;
      color:var(--text);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🚦 Tablero de Despachos</h1>
  <p>Solo lectura · Semáforo automático · Datos desde editar.html</p>
</header>

<div class="wrap">
  <section class="card">

    <div class="topbar">
      <input id="filtro" placeholder="Buscar (exportadora, mercado, transporte, despacho…)">
      editar.html✏️ Editar</a>
    </div>

    <div style="overflow:auto; max-height:72vh">
      <table id="tabla">
        <thead>
          <tr>
            <th>Despacho</th>
            <th>Exportadora / Movimiento</th>
            <th>Variedad / Mercado</th>
            <th>Transporte</th>
            <th>Pallets / Citación</th>
            <th>Estado</th>
            <th>⏱ Tiempo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </section>
</div>

<script>
  const KEY = "despachos_contenedores_v1";
  const $ = id => document.getElementById(id);

  function cargar(){
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch(e){ return []; }
  }

  function estado(r){
    if (r.cancelado) return {t:"No llegó", c:"#e74c3c"};
    if (!r.horaLlegada) return {t:"En espera", c:"#f7b500"};
    if (!r.horaTermino) return {t:"Cargando", c:"#2d7dff"};
    return {t:"Despachado", c:"#2ecc71"};
  }

  function parse(hhmm){
    if(!hhmm) return null;
    const [h,m] = hhmm.split(":").map(Number);
    const d = new Date();
    d.setHours(h,m,0,0);
    return d;
  }

  function diffMin(a,b){
    if(!a||!b) return null;
    let m = Math.floor((b-a)/60000);
    if(m<0) m+=1440;
    return m;
  }

  function tiempo(r){
    if(r.horaTermino){
      return diffMin(parse(r.horaInicioCarga||r.horaLlegada), parse(r.horaTermino));
    }
    if(r.horaLlegada){
      return diffMin(parse(r.horaInicioCarga||r.horaLlegada), new Date());
    }
    return null;
  }

  function fmt(m){
    if(m==null) return "—";
    const h=Math.floor(m/60), mm=m%60;
    return h>0 ? `${h}h ${mm}m` : `${mm}m`;
  }

  function render(){
    const data = cargar();
    const q = ($("filtro").value||"").toLowerCase();
    const tbody = document.querySelector("#tabla tbody");
    tbody.innerHTML="";

    data
      .filter(r => !q || JSON.stringify(r).toLowerCase().includes(q))
      .forEach(r=>{
        const e = estado(r);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><b>${r.numeroDespacho||""}</b></td>
          <td><b>${r.exportadora||""}</b><div class="small">${r.tipoMovimiento||""}</div></td>
          <td><b>${r.variedad||""}</b><div class="small">${r.mercado||""}</div></td>
          <td>${r.transporte||""}</td>
          <td><b>${r.cantidadPallets||"—"}</b><div class="small">${r.horaCitacion||"—"}</div></td>
          <td><span class="badge" style="background:${e.c}">${e.t}</span></td>
          <td><b>${fmt(tiempo(r))}</b></td>
        `;
        tbody.appendChild(tr);
      });
  }

  $("filtro").addEventListener("input", render);
  setInterval(render, 60000);
  render();
</script>

</body>
</html>
