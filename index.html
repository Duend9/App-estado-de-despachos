<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚦 Tablero de Despachos</title>

  <style>
    :root{
      --bg:#0b1220; --card:#101a33; --text:#e9eefc; --muted:#a7b2d6;
      --line:#22305a; --ok:#2ecc71; --warn:#f7b500; --work:#2d7dff; --bad:#e74c3c;
      --alert:#ff4d4d;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,#070b14,var(--bg));
      color:var(--text);
    }

    header{
      padding:16px 18px;
      position:sticky;
      top:0;
      background:rgba(11,18,32,.95);
      backdrop-filter: blur(6px);
      border-bottom:1px solid var(--line);
      z-index:10;
    }

    .wrap{max-width:1500px;margin:0 auto;padding:14px}
    .card{background:rgba(16,26,51,.92);border:1px solid var(--line);border-radius:14px;padding:14px}

    /* ---------- TOP ---------- */
    .top{
      display:grid;
      gap:12px;
      align-items:center;
    }
    @media(min-width:980px){
      .top{grid-template-columns:1.3fr 1fr 1.7fr}
    }

    .title h1{margin:0;font-size:22px}
    .title p{margin:6px 0 0;color:var(--muted);font-size:13px}

    .clockBox{
      text-align:center;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#0b1430;
    }
    .clock{font-size:46px;font-weight:900}
    .date{margin-top:4px;font-size:14px;color:var(--muted)}

    .kpis{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
    }
    .kpi{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#0b1430;
      text-align:center;
    }
    .kpi .label{font-size:12px;color:var(--muted);font-weight:800}
    .kpi .value{font-size:26px;font-weight:900;margin-top:4px}
    .kpi.wait .value{color:var(--warn)}
    .kpi.work .value{color:var(--work)}
    .kpi.ok .value{color:var(--ok)}
    .kpi.bad .value{color:var(--bad)}
    .kpi.pallets .value{color:#cfa9ff}

    /* ---------- TABLE ---------- */
    .table-wrap{
      max-height:70vh;
      overflow:auto;
    }

    table{width:100%;border-collapse:collapse}
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      font-size:15px;
      text-align:left;
      vertical-align:top;
      background:rgba(16,26,51,.92);
    }

    thead th{
      position:sticky;
      top:0;
      z-index:5;
      background:rgba(16,26,51,.98);
      color:var(--muted);
      font-weight:900;
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      color:#fff;
      font-weight:900;
      font-size:13px;
    }
    .small{font-size:12px;color:var(--muted)}

    tr.alerta{
      background:rgba(255,77,77,.12);
    }

    /* ---------- TV MODE ---------- */
    body.tv th, body.tv td{font-size:18px}
    body.tv .clock{font-size:64px}
    body.tv .kpi .value{font-size:36px}
  </style>
</head>

<body>

<header>
  <div class="wrap top">
    <div class="title">
      <h1>🚦 Tablero de Despachos</h1>
      <p>Reloj · KPIs · Actualización automática</p>
    </div>

    <div class="clockBox">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="date">—</div>
    </div>

    <div class="kpis">
      <div class="kpi wait"><div class="label">🟡 En espera</div><div class="value" id="kpiEspera">0</div></div>
      <div class="kpi work"><div class="label">🔵 Cargando</div><div class="value" id="kpiCargando">0</div></div>
      <div class="kpi ok"><div class="label">🟢 Despachado</div><div class="value" id="kpiDespachado">0</div></div>
      <div class="kpi bad"><div class="label">🔴 No llegó</div><div class="value" id="kpiCancelado">0</div></div>
      <div class="kpi pallets"><div class="label">📦 Pallets hoy</div><div class="value" id="kpiPallets">0</div></div>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="card">
    <div class="table-wrap">
      <table id="tabla">
        <thead>
          <tr>
            <th>Despacho</th>
            <th>Exportadora</th>
            <th>Tipo movimiento</th>
            <th>Variedad / Mercado</th>
            <th>Transporte</th>
            <th>Pallets / Citación</th>
            <th>Estado</th>
            <th>⏱ Tiempo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>

<script>
  const KEY="despachos_contenedores_v1";
  const LIMITE_ALERTA=90;
  const $=id=>document.getElementById(id);

  function tickClock(){
    const d=new Date();
    $("clock").textContent=d.toLocaleTimeString("es-CL");
    $("date").textContent=d.toLocaleDateString("es-CL",
      {weekday:"long",year:"numeric",month:"long",day:"numeric"});
  }
  setInterval(tickClock,1000);tickClock();

  function cargar(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}

  function estado(r){
    if(r.cancelado) return {t:"No llegó",c:"#e74c3c",k:"bad"};
    if(!r.horaLlegada) return {t:"En espera",c:"#f7b500",k:"wait"};
    if(!r.horaTermino) return {t:"Cargando",c:"#2d7dff",k:"work"};
    return {t:"Despachado",c:"#2ecc71",k:"ok"};
  }

  function parse(hhmm){
    if(!hhmm) return null;
    const [h,m]=hhmm.split(":").map(Number);
    const d=new Date();d.setHours(h,m,0,0);return d;
  }
  function diff(a,b){
    if(!a||!b) return null;
    let m=Math.floor((b-a)/60000);if(m<0)m+=1440;return m;
  }
  function fmt(m){
    if(m==null) return "—";
    const h=Math.floor(m/60),mm=m%60;
    return h>0?`${h}h ${mm}m`:`${mm}m`;
  }
  function tiempo(r){
    if(r.horaTermino) return diff(parse(r.horaInicioCarga||r.horaLlegada),parse(r.horaTermino));
    if(r.horaLlegada) return diff(parse(r.horaInicioCarga||r.horaLlegada),new Date());
    return null;
  }

  function render(){
    const data=cargar();
    let k={wait:0,work:0,ok:0,bad:0}, palletsHoy=0;
    const tbody=document.querySelector("#tabla tbody");
    tbody.innerHTML="";

    data.forEach(r=>{
      const e=estado(r);k[e.k]++;
      if(e.k==="ok") palletsHoy+=Number(r.cantidadPallets||0);
      const mins=tiempo(r);
      const tr=document.createElement("tr");
      if(e.k==="work" && mins>=LIMITE_ALERTA) tr.classList.add("alerta");
      tr.innerHTML=`
        <td><b>${r.numeroDespacho||""}</b></td>
        <td>${r.exportadora||""}</td>
        <td>${r.tipoMovimiento||""}</td>
        <td><b>${r.variedad||""}</b><div class="small">${r.mercado||""}</div></td>
        <td>${r.transporte||""}</td>
        <td><b>${r.cantidadPallets||"—"}</b><div class="small">${r.horaCitacion||"—"}</div></td>
        <td><span class="badge" style="background:${e.c}">${e.t}</span></td>
        <td><b>${fmt(mins)}</b></td>`;
      tbody.appendChild(tr);
    });

    $("kpiEspera").textContent=k.wait;
    $("kpiCargando").textContent=k.work;
    $("kpiDespachado").textContent=k.ok;
    $("kpiCancelado").textContent=k.bad;
    $("kpiPallets").textContent=palletsHoy;
  }

  render();
  setInterval(render,30000);
  setTimeout(()=>document.body.classList.add("tv"),10000);
</script>

</body>
</html>
