<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tablero Despachos (TV)</title>

  <style>
    :root{
      --bg:#0b1220; --card:#101a33; --text:#e9eefc; --muted:#a7b2d6;
      --line:#22305a; --ok:#2ecc71; --warn:#f7b500; --work:#2d7dff; --bad:#e74c3c;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,#070b14,var(--bg));
      color:var(--text);
    }

    header{
      position:sticky;
      top:0;
      background:rgba(11,18,32,.95);
      border-bottom:1px solid var(--line);
      z-index:10;
    }

    .wrap{max-width:1400px;margin:0 auto;padding:14px}

    .top{
      display:grid;
      gap:12px;
      grid-template-columns: 1fr 1fr 1fr;
      align-items:center;
    }

    .brand h1{margin:0;font-size:20px}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}

    .clockBox{
      text-align:center;
      background:#0b1430;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
    }
    .clock{font-size:40px;font-weight:900}
    .date{font-size:14px;color:var(--muted)}

    .summary{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }
    .kpi{
      background:#0b1430;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      text-align:center;
    }
    .kpi .label{font-size:12px;color:var(--muted)}
    .kpi .value{font-size:26px;font-weight:900}
    .wait{color:var(--warn)}
    .work{color:var(--work)}
    .ok{color:var(--ok)}
    .bad{color:var(--bad)}

    .controls{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      margin-top:8px;
    }

    input,button{
      background:#0b1430;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      font-weight:700;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px;
      font-size:14px;
    }
    th{color:var(--muted)}

    .badge{
      padding:6px 10px;
      border-radius:999px;
      font-weight:900;
      color:white;
    }

    /* ===== MODO TV ===== */
    body.modo-tv .controls,
    body.modo-tv input,
    body.modo-tv button{
      display:none;
    }

    body.modo-tv .clock{font-size:60px}
    body.modo-tv .kpi .value{font-size:34px}
    body.modo-tv th,
    body.modo-tv td{font-size:18px}
  </style>
</head>

<body>

<header>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <h1>🚦 Tablero de Despachos</h1>
        <p>Solo lectura – Pantalla Planta</p>
      </div>

      <div class="clockBox">
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="date">—</div>
      </div>

      <div class="summary">
        <div class="kpi wait"><div class="label">En espera</div><div class="value" id="kpiEspera">0</div></div>
        <div class="kpi work"><div class="label">Cargando</div><div class="value" id="kpiCargando">0</div></div>
        <div class="kpi ok"><div class="label">Despachado</div><div class="value" id="kpiDespachado">0</div></div>
        <div class="kpi bad"><div class="label">No llegó</div><div class="value" id="kpiCancelado">0</div></div>
      </div>
    </div>

    <div class="controls">
      <input id="filtro" placeholder="Buscar..." />
      <button id="btnTV">📺 Modo TV</button>
    </div>
  </div>
</header>

<div class="wrap">
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Despacho</th>
        <th>Transporte</th>
        <th>Empresa</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>

  const $ = id => document.getElementById(id);
