<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar – Prueba mínima</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #ffffff;
      padding: 40px;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    .ok {
      color: #2ecc71;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>✅ editar.html – Prueba mínima</h1>

  <p>Si ves este texto y el botón funciona, GitHub Pages está OK.</p>

  <button id="btn">Guardar prueba</button>

  <div id="msg" class="ok"></div>

  <script>
    // Forzar HTTPS en GitHub Pages
    if (location.hostname.endsWith("github.io") && location.protocol === "http:") {
      location.replace("https://" + location.host + location.pathname);
    }

    const KEY = "prueba_gitpages_ok";

    document.getElementById("btn").addEventListener("click", () => {
      localStorage.setItem(KEY, "FUNCIONA");
      document.getElementById("msg").textContent =
        "✅ JavaScript OK – localStorage guardó correctamente";
    });

    // Comprobación al cargar
    if (localStorage.getItem(KEY)) {
      document.getElementById("msg").textContent =
        "✅ localStorage ya tenía datos guardados";
    }
  </script>

</body>
</html>
