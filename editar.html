<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>✏️ Editar Despachos (Sheets)</title>
  <style>
    :root{--bg:#0b1220;--card:#101a33;--text:#e9eefc;--muted:#a7b2d6;--line:#22305a;--ok:#2ecc71;--warn:#f7b500;--work:#2d7dff;--bad:#e74c3c;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#070b14,var(--bg));color:var(--text);}
    header{padding:16px 18px;position:sticky;top:0;background:rgba(11,18,32,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);z-index:10}
    header h1{margin:0;font-size:18px} header p{margin:6px 0 0;color:var(--muted);font-size:13px}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .grid{display:grid;gap:12px;min-height:70vh;}
    @media(min-width:980px){.grid{grid-template-columns:1.2fr .8fr}}
    .card{background:rgba(16,26,51,.92);border:1px solid var(--line);border-radius:14px;padding:14px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    input,textarea{width:100%;box-sizing:border-box;padding:10px;background:#0b1430;color:var(--text);border:1px solid var(--line);border-radius:10px;outline:none}
    textarea{min-height:90px;resize:vertical}
    button,a.btn{border:1px solid var(--line);background:#0b1430;color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:900;text-decoration:none;display:inline-block}
    button.good{background:linear-gradient(180deg,#3be28a,#2ecc71);border-color:#2ecc71}
    button.danger{background:linear-gradient(180deg,#ff6b6b,#e74c3c);border-color:#e74c3c}
    button.primary{background:linear-gradient(180deg,#2d7dff,#1f5ed4);border-color:#1f5ed4}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;vertical-align:top;font-size:13px}
    th{color:var(--muted);font-weight:900;position:sticky;top:74px;background:rgba(16,26,51,.96)}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;color:white;font-weight:900;font-size:12px;white-space:nowrap}
    .small{font-size:12px;color:var(--muted);margin-top:4px}
    .tools{display:flex;gap:8px;flex-wrap:wrap}
    .tools button{padding:8px 10px;font-size:12px}
    .toast{display:none;position:fixed;right:16px;bottom:16px;background:#0b1430;border:1px solid var(--line);padding:12px 14px;border-radius:14px;max-width:520px;z-index:9999}
    .toast strong{display:block;margin-bottom:4px}
  </style>
</head>
<body>
<header>
  <h1>✏️ Edición (Google Sheets)</h1>
  <p>Multiusuario: todos ven lo mismo. Guarda por etapas: Llegó → Iniciar → Terminar.</p>
</header>

<div class="wrap grid">
  <section class="card">
    <div class="topbar">
      <input id="filtro" placeholder="Buscar (exportadora, mercado, transporte, despacho…)" />
      index.html🚦 Tablero</a>
    </div>

    <div style="overflow:auto;max-height:70vh;border-radius:12px">
      <table id="tabla">
        <thead>
          <tr>
            <th>Despacho</th>
            <th>Exportadora / Mercado</th>
            <th>Transporte</th>
            <th>Estado</th>
            <th>⏱</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="small">Refresco automático cada 30s.</div>
  </section>

  <section class="card">
    <div class="topbar">
      <b id="modo">Nuevo</b>
      <button class="primary" id="btnReload" type="button">🔄 Recargar</button>
    </div>

    <form id="form">
      <label>N° Despacho</label><input id="numeroDespacho">
      <label>Exportadora</label><input id="exportadora">
      <label>Tipo de movimiento</label><input id="tipoMovimiento">
      <label>Variedad</label><input id="variedad">
      <label>Mercado</label><input id="mercado">
      <label>Hora citación</label><input id="horaCitacion" type="time">
      <label>Cantidad pallets</label><input id="cantidadPallets" type="number" step="1">
      <label>Transporte</label><input id="transporte">

      <label>Hora llegada</label><input id="horaLlegada" type="time">
      <label>Hora inicio carga</label><input id="horaInicioCarga" type="time">
      <label>Hora término carga</label><input id="horaTermino" type="time">

      <label>Observaciones</label><textarea id="observaciones"></textarea>

      <div class="tools" style="margin-top:10px">
        <button class="primary" type="submit">💾 Guardar</button>
        <button type="button" id="btnNuevo">🧹 Nuevo</button>
        <button class="danger" type="button" id="btnEliminar">🗑️ Eliminar</button>
      </div>
    </form>
  </section>
</div>

<div class="toast" id="toast"><strong id="toastT">—</strong><div id="toastM">—</div></div>

<script>
  // === CONFIG ===
  const API_URL = "https://script.google.com/macros/s/AKfycbwj5pxE2ui8O9GEseGX74aktU2EiwDRYxXQbrCTo5uTn8wXbc55p4J5-p0-cJPqarWAJw/exec";
  const SECRET  = "FP2026DESPACHOS";

  const $ = id => document.getElementById(id);
  let rows = [];
  let editId = null;

  function toast(t,m){ $("toastT").textContent=t; $("toastM").textContent=m; $("toast").style.display="block"; setTimeout(()=>$("toast").style.display="none",2500); }
  function newId(){ return Date.now().toString(36)+"_"+Math.random().toString(16).slice(2); }
  function ahoraHHMM(){ return new Date().toTimeString().slice(0,5); }

  function estado(r){
    if(String(r.cancelado).toLowerCase()==="true") return {t:"No llegó",c:"#e74c3c"};
    if(!r.horaLlegada) return {t:"En espera",c:"#f7b500"};
    if(!r.horaTermino) return {t:"Cargando",c:"#2d7dff"};
    return {t:"Despachado",c:"#2ecc71"};
  }

  function parse(hhmm){ if(!hhmm) return null; const [h,m]=hhmm.split(":").map(Number); const d=new Date(); d.setHours(h,m,0,0); return d; }
  function diff(a,b){ if(!a||!b) return null; let m=Math.floor((b-a)/60000); if(m<0)m+=1440; return m; }
  function fmt(m){ if(m==null) return "—"; const h=Math.floor(m/60),mm=m%60; return h>0?`${h}h ${mm}m`:`${mm}m`; }
  function tiempo(r){ if(r.horaTermino) return diff(parse(r.horaInicioCarga||r.horaLlegada),parse(r.horaTermino));
                     if(r.horaLlegada) return diff(parse(r.horaInicioCarga||r.horaLlegada),new Date());
                     return null; }

  // === JSONP LOAD (evita CORS) ===
  function loadRows(){
    return new Promise((resolve,reject)=>{
      const cb = "__cb_" + Date.now();
      window[cb] = (data)=>{
        try{
          if(data && data.ok && Array.isArray(data.rows)) resolve(data.rows);
          else reject(data && data.error ? data.error : "Respuesta inválida");
        } finally {
          delete window[cb];
        }
      };
      const s = document.createElement("script");
      s.src = `${API_URL}?secret=${encodeURIComponent(SECRET)}&callback=${encodeURIComponent(cb)}&_=${Date.now()}`;
      s.onerror = ()=>{ delete window[cb]; reject("Error cargando datos"); };
      document.body.appendChild(s);
      // limpiar script luego
      setTimeout(()=>{ try{s.remove();}catch(e){} }, 5000);
    });
  }

  // === POST por FORM (evita CORS) ===
  function postRow(row){
    return new Promise((resolve)=>{
      const iframeName = "hidden_iframe";
      let iframe = document.querySelector(`iframe[name="${iframeName}"]`);
      if(!iframe){
        iframe = document.createElement("iframe");
        iframe.name = iframeName;
        iframe.style.display="none";
        document.body.appendChild(iframe);
      }
      const form = document.createElement("form");
      form.action = API_URL;
      form.method = "POST";
      form.target = iframeName;

      const inp1 = document.createElement("input");
      inp1.type="hidden"; inp1.name="secret"; inp1.value=SECRET;

      const inp2 = document.createElement("input");
      inp2.type="hidden"; inp2.name="payload"; inp2.value=JSON.stringify(row);

      form.appendChild(inp1); form.appendChild(inp2);
      document.body.appendChild(form);
      form.submit();
      form.remove();

      // No leemos respuesta (por cross-origin), pero recargamos después
      setTimeout(()=>resolve(true), 300);
    });
  }

  function leerForm(){
    return {
      id: editId || newId(),
      numeroDespacho: $("numeroDespacho").value.trim(),
      exportadora: $("exportadora").value.trim(),
      tipoMovimiento: $("tipoMovimiento").value.trim(),
      variedad: $("variedad").value.trim(),
      mercado: $("mercado").value.trim(),
      horaCitacion: $("horaCitacion").value,
      cantidadPallets: $("cantidadPallets").value,
      transporte: $("transporte").value.trim(),
      horaLlegada: $("horaLlegada").value,
      horaInicioCarga: $("horaInicioCarga").value,
      horaTermino: $("horaTermino").value,
      cancelado: "false",
      motivoCancelacion: "",
      horaCancelacion: "",
      observaciones: $("observaciones").value.trim()
    };
  }

  function cargarForm(r){
    editId = r.id;
    $("modo").textContent = "Editando";
    $("numeroDespacho").value = r.numeroDespacho || "";
    $("exportadora").value = r.exportadora || "";
    $("tipoMovimiento").value = r.tipoMovimiento || "";
    $("variedad").value = r.variedad || "";
    $("mercado").value = r.mercado || "";
    $("horaCitacion").value = r.horaCitacion || "";
    $("cantidadPallets").value = r.cantidadPallets || "";
    $("transporte").value = r.transporte || "";
    $("horaLlegada").value = r.horaLlegada || "";
    $("horaInicioCarga").value = r.horaInicioCarga || "";
    $("horaTermino").value = r.horaTermino || "";
    $("observaciones").value = r.observaciones || "";
  }

  function limpiarForm(){
    editId = null;
    $("modo").textContent = "Nuevo";
    $("form").reset();
  }

  async function refresh(){
    rows = await loadRows();
    renderTabla();
  }

  function renderTabla(){
    const q = ($("filtro").value||"").toLowerCase();
    const tbody = document.querySelector("#tabla tbody");
    tbody.innerHTML="";

    rows
      .filter(r=>!q || JSON.stringify(r).toLowerCase().includes(q))
      .forEach(r=>{
        const e = estado(r);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><b>${r.numeroDespacho||""}</b><div class="small">${r.tipoMovimiento||""}</div></td>
          <td><b>${r.exportadora||""}</b><div class="small">${r.mercado||""} · ${r.variedad||""}</div></td>
          <td><b>${r.transporte||""}</b><div class="small">Pallets: ${r.cantidadPallets||"—"} · Cita: ${r.horaCitacion||"—"}</div></td>
          <td><span class="badge" style="background:${e.c}">${e.t}</span></td>
          <td><b>${fmt(tiempo(r))}</b></td>
          <td class="tools">
            <button class="good" type="button" onclick="llego('${r.id}')">Llegó</button>
            <button type="button" onclick="inicio('${r.id}')">Iniciar</button>
            <button type="button" onclick="termino('${r.id}')">Terminar</button>
            <button type="button" onclick="edit('${r.id}')">Editar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
  }

  function findById(id){ return rows.find(x=>String(x.id)===String(id)); }

  window.edit = (id)=>{ const r=findById(id); if(r) cargarForm(r); };

  window.llego = async (id)=>{
    const r = findById(id); if(!r) return;
    r.horaLlegada = r.horaLlegada || ahoraHHMM();
    r.cancelado = "false";
    await postRow(r);
    toast("✅ Guardado","Etapa: Llegó");
    refresh();
  };
  window.inicio = async (id)=>{
    const r = findById(id); if(!r) return;
    r.horaLlegada = r.horaLlegada || ahoraHHMM();
    r.horaInicioCarga = r.horaInicioCarga || ahoraHHMM();
    r.cancelado = "false";
    await postRow(r);
    toast("✅ Guardado","Etapa: Inicio");
    refresh();
  };
  window.termino = async (id)=>{
    const r = findById(id); if(!r) return;
    r.horaLlegada = r.horaLlegada || ahoraHHMM();
    r.horaInicioCarga = r.horaInicioCarga || ahoraHHMM();
    r.horaTermino = r.horaTermino || ahoraHHMM();
    r.cancelado = "false";
    await postRow(r);
    toast("✅ Guardado","Etapa: Término");
    refresh();
  };

  $("form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const r = leerForm();
    await postRow(r);
    toast("✅ Guardado", editId ? "Cambios actualizados" : "Registro creado");
    limpiarForm();
    refresh();
  });

  $("btnNuevo").addEventListener("click", limpiarForm);
  $("btnEliminar").addEventListener("click", async ()=>{
    if(!editId) return toast("ℹ️","Selecciona un registro (Editar) primero");
    const r = findById(editId);
    if(!r) return;
    if(!confirm("¿Eliminar este registro?")) return;
    // eliminamos marcando cancelado y motivo (si prefieres borrado real, se hace en Apps Script)
    r.cancelado="true"; r.motivoCancelacion="Eliminado"; r.horaCancelacion=ahoraHHMM();
    await postRow(r);
    toast("✅","Eliminado (marcado)");
    limpiarForm();
    refresh();
  });

  $("btnReload").addEventListener("click", refresh);
  $("filtro").addEventListener("input", renderTabla);

  // init + refresco
  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
